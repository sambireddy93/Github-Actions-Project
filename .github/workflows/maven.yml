name: CICD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  compile:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Maven
        uses: stCarolas/setup-maven@v4.5
        with:
          maven-version: 3.9.0

      - name: Build with Maven
        run: mvn compile

  security-check:
    runs-on: self-hosted
    needs: compile

    steps:
      - uses: actions/checkout@v4

      - name: Install Git
        run: |
          sudo yum update -y
          sudo yum install -y git

      - name: Install Trivy
        run: |
          sudo yum install -y wget tar curl
          TRIVY_VERSION=$(curl -s https://api.github.com/repos/aquasecurity/trivy/releases/latest | grep tag_name | cut -d '"' -f 4)
          wget https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${TRIVY_VERSION:1}_Linux-64bit.tar.gz
          tar zxvf trivy_${TRIVY_VERSION:1}_Linux-64bit.tar.gz
          sudo mv trivy /usr/local/bin/
          trivy --version

      - name: Trivy Filesystem Scan
        run: trivy fs --format table -o fs-report.json .

      - name: Install Gitleaks
        run: |
          sudo yum install -y wget tar curl
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep tag_name | cut -d '"' -f 4)
          wget https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION:1}_linux_x64.tar.gz
          tar zxvf gitleaks_${GITLEAKS_VERSION:1}_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks --version

      - name: Gitleaks Code Scan
        run: gitleaks detect --source . -r gitleaks-report.json -f json
